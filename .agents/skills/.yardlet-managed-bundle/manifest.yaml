      - external documentation, provider-specific runtime, extra dispatcher, rendering tool, package install, remote mutation 표면을 제거했다.
      - 검증을 기존 skill author, evaluator, apply, review 경로로 번역했다.
    residual_requirements:
      - configured skill author, evaluator, and review worker cost through existing Yardlet paths

